<!DOCTYPE html>
<!--
  ============================================================
  BREW BONANZA — Pixel Coffee Shop Time-Management Game
  ============================================================
  Architecture: Single-file, pure vanilla JS + HTML5 Canvas 2D.
  No build step, no dependencies. Designed for browser jam play.

  Systems overview:
    PALETTE     – Shared colour constants (P object)
    AUDIO       – Web Audio API synth: jazz-bossa BGM + SFX
    GAME STATE  – Global G object; state machine drives the loop
    SHOP        – SHOP_ITEMS decorations; stacked patience bonuses
    TUTORIAL    – TUT state machine; 16 guided steps, no timer
    DRINKS      – Recipe definitions (steps[], price, colours)
    STATIONS    – 8 drag-source panels (4L / 4R of canvas)
    CUSTOMERS   – Procedural NPCs with per-tick patience decay
    RENDERING   – BG → stations → customers → cup → HUD → FX
    INPUT       – Mouse + Touch → normalised canvas coords
    MAIN LOOP   – requestAnimationFrame; delta-time for timer
  ============================================================
-->
<html lang="en">

  width:min(100vw, 150vh);

}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
</style>
</head>

<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
ctx.imageSmoothingEnabled=false;

// ─────────────────────────────────────────────────────────────
// PALETTE
// Central colour registry.  Every draw call reads from P so
// the entire visual theme can be adjusted in one place.
// ─────────────────────────────────────────────────────────────
const P={
  bg:'#2b1a0e', counter:'#3d2010', counterTop:'#6b3a1f',
  wall:'#1a0f0a', wallDeco:'#2d1a0d',
  wood:'#7a4520', woodLight:'#a05c2c',
  cream:'#f5e6c8', milk:'#fff8ee',
  espresso:'#1a0800', coffee:'#3d1a00', latte:'#c8814a',
  mocha:'#3d1a0e', caramel:'#c87820',
  steam:'rgba(255,255,255,0.15)',
  cup:'#e8d5b0', cupDark:'#c4a87a',
  btn:'#5c2d10', btnHover:'#7a3d16', btnText:'#f5e6c8',
  score:'#f5c842', tip:'#4caf50',
  bad:'#e53935', good:'#43a047',
  customer1:'#e8a87c', customer2:'#c87040', customer3:'#a05030',
  shirt1:'#5c8abf', shirt2:'#bf5c5c', shirt3:'#5cbf7a',
  thought:'#fff8ee',
};

// ─────────────────────────────────────────────────────────────
// AUDIO — Web Audio API (synthesised, no asset files)
//
// All sound is generated at runtime via oscillators and noise
// buffers so the game ships as a single HTML file.
//
// BGM strategy: notes are pre-scheduled ~loopDur seconds into
// the future so the audio thread never stalls on the JS frame
// budget.  A setTimeout reschedules the next loop 0.3 s before
// the current one ends, keeping scheduling ahead of playback.
// ─────────────────────────────────────────────────────────────
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
/** Lazy-init the AudioContext — browsers block creation until a user gesture. */
function getAudio(){ if(!audioCtx) audioCtx=new AudioCtx(); return audioCtx; }

// ── MUSIC ─────────────────────────────────────────────────────
/** Guards against double-starting the BGM loop (e.g. multi-touch). */
let musicStarted=false;
let musicMuted=false;
/** Single gain node that controls overall BGM volume for mute toggling. */
let masterGain=null;

/** Note frequency table (Hz).  R=0 is a rest (silence). */
const NOTE={
  C3:130.8,D3:146.8,E3:164.8,F3:174.6,G3:196,A3:220,B3:246.9,
  C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,
  C5:523.3,D5:587.3,E5:659.3,F5:698.5,G5:784,A5:880,B5:987.8,
  Bb3:233.1,Bb4:466.2,Eb4:311.1,Ab4:415.3,Db4:277.2,
  R:0 // rest
};

/** 8-bar jazz-bossa melody.  Flat pair array: [freq, durationInBeats, ...] */
const MELODY_NOTES=[
  NOTE.E5,0.5, NOTE.D5,0.5, NOTE.C5,1,   NOTE.E5,0.5, NOTE.G5,0.5, NOTE.A5,1,
  NOTE.G5,0.5, NOTE.E5,0.5, NOTE.D5,1,   NOTE.C5,0.5, NOTE.D5,0.5, NOTE.E5,1,
  NOTE.C5,1,   NOTE.Bb4,0.5,NOTE.A4,0.5, NOTE.G4,1.5, NOTE.R,0.5,
  NOTE.A4,0.5, NOTE.G4,0.5, NOTE.E4,1,   NOTE.G4,0.5, NOTE.A4,0.5, NOTE.C5,1,
  NOTE.D5,0.5, NOTE.E5,0.5, NOTE.G5,1,   NOTE.E5,0.5, NOTE.D5,0.5, NOTE.C5,1,
  NOTE.E5,0.5, NOTE.G5,0.5, NOTE.A5,0.5, NOTE.G5,0.5, NOTE.E5,1,   NOTE.D5,1,
  NOTE.C5,0.5, NOTE.D5,0.5, NOTE.E5,0.5, NOTE.D5,0.5, NOTE.C5,0.5, NOTE.A4,0.5, NOTE.G4,1,
  NOTE.A4,0.5, NOTE.C5,0.5, NOTE.E5,1,   NOTE.D5,0.5, NOTE.C5,0.5, NOTE.G4,2,
];

/** 2-bar walking bass line — looped to fill whatever the melody length is. */
const BASS_NOTES=[
  NOTE.C3,1, NOTE.E3,0.5, NOTE.G3,0.5,
  NOTE.A3,1, NOTE.G3,0.5, NOTE.E3,0.5,
  NOTE.F3,1, NOTE.A3,0.5, NOTE.C4,0.5,
  NOTE.G3,1, NOTE.B3,0.5, NOTE.D4,0.5,
];

const BPM=108;
const BEAT=60/BPM;

/**
 * Schedule a single synthesised note on the Web Audio graph.
 * Uses ADSR-style envelope: fast attack, mid-sustain, exponential release.
 * @param {AudioContext} ac
 * @param {number} freq   - Frequency in Hz; 0 = rest (no-op).
 * @param {number} startTime - Absolute AudioContext time to begin.
 * @param {number} dur    - Duration in beats.
 * @param {string} type   - OscillatorType ('sine'|'triangle'|'square'|'sawtooth').
 * @param {number} vol    - Peak gain (0–1).
 * @param {GainNode} gainNode - Output gain node (usually masterGain).
 */
function scheduleNote(ac, freq, startTime, dur, type='sine', vol=0.12, gainNode){
  if(freq===0) return; // rest — emit no oscillator
  const osc=ac.createOscillator();
  const g=ac.createGain();
  osc.connect(g);
  g.connect(gainNode||ac.destination);
  osc.type=type;
  osc.frequency.setValueAtTime(freq, startTime);
  // soft attack, quick decay to sustain, release
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(vol, startTime+0.02);
  g.gain.setValueAtTime(vol*0.7, startTime+dur*BEAT*0.3);
  g.gain.exponentialRampToValueAtTime(0.001, startTime+dur*BEAT*0.92);
  osc.start(startTime);
  osc.stop(startTime+dur*BEAT+0.05);
}

/**
 * Synthesised kick drum: sine oscillator pitched from 150 Hz → 40 Hz over 120 ms.
 * The rapid frequency drop gives the characteristic thump of a bass drum.
 */
function scheduleKick(ac, startTime, gainNode){
  const osc=ac.createOscillator();
  const g=ac.createGain();
  osc.connect(g); g.connect(gainNode||ac.destination);
  osc.type='sine';
  osc.frequency.setValueAtTime(150,startTime);
  osc.frequency.exponentialRampToValueAtTime(40,startTime+0.12);
  g.gain.setValueAtTime(0.22,startTime);
  g.gain.exponentialRampToValueAtTime(0.001,startTime+0.2);
  osc.start(startTime); osc.stop(startTime+0.25);
}

/**
 * Synthesised hi-hat: short white-noise burst through a high-pass filter at 8 kHz.
 * @param {number} vol - Quieter on off-beats (0.032) than on-beats (0.05).
 */
function scheduleHihat(ac, startTime, vol=0.06, gainNode){
  const buf=ac.createBuffer(1,ac.sampleRate*0.05,ac.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
  const src=ac.createBufferSource();
  const filt=ac.createBiquadFilter();
  const g=ac.createGain();
  src.buffer=buf;
  filt.type='highpass'; filt.frequency.value=8000;
  src.connect(filt); filt.connect(g); g.connect(gainNode||ac.destination);
  g.gain.setValueAtTime(vol,startTime);
  g.gain.exponentialRampToValueAtTime(0.001,startTime+0.05);
  src.start(startTime);
}

/**
 * Synthesised snare: decaying white-noise burst through a band-pass filter at 2 kHz.
 * Linear amplitude taper (1 - i/length) gives the characteristic snare snap shape.
 */
function scheduleSnare(ac, startTime, gainNode){
  const buf=ac.createBuffer(1,ac.sampleRate*0.15,ac.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*(1-i/data.length);
  const src=ac.createBufferSource();
  const filt=ac.createBiquadFilter();
  const g=ac.createGain();
  src.buffer=buf;
  filt.type='bandpass'; filt.frequency.value=2000; filt.Q.value=0.8;
  src.connect(filt); filt.connect(g); g.connect(gainNode||ac.destination);
  g.gain.setValueAtTime(0.1,startTime);
  g.gain.exponentialRampToValueAtTime(0.001,startTime+0.14);
  src.start(startTime);
}

let musicLoopTimeout=null;
let loopStartTime=0;

/** Begin BGM playback.  Safe to call multiple times — guarded by musicStarted. */
function startMusic(){
  if(musicStarted) return;
  musicStarted=true;
  const ac=getAudio();
  masterGain=ac.createGain();
  masterGain.gain.value=musicMuted?0:0.55;
  masterGain.connect(ac.destination);
  scheduleLoop(ac.currentTime+0.1);
}

/**
 * Pre-schedule one full loop of BGM (melody + bass + chords + drums) into
 * the Web Audio timeline starting at startTime.  Calls itself via setTimeout
 * ~0.3 s before the loop ends to chain seamlessly without gaps.
 * @param {number} startTime - Absolute AudioContext time for loop start.
 */
function scheduleLoop(startTime){
  if(!musicStarted) return;
  const ac=getAudio();
  loopStartTime=startTime;

  // Sum beat durations to find total loop length before scheduling anything
  let melodyBeats=0;
  for(let i=0;i<MELODY_NOTES.length;i+=2) melodyBeats+=MELODY_NOTES[i+1];

  // ── Melody (vibraphone-ish sine with slight detune) ──
  let t=startTime;
  for(let i=0;i<MELODY_NOTES.length;i+=2){
    const freq=MELODY_NOTES[i];
    const dur=MELODY_NOTES[i+1];
    scheduleNote(ac,freq,t,dur,'sine',0.13,masterGain);
    // 0.794 ≈ minor-third interval ratio; adds subtle warmth on sustained notes
    if(dur>=1&&freq>0){
      scheduleNote(ac,freq*0.794,t+0.01,dur,'sine',0.04,masterGain);
    }
    t+=dur*BEAT;
  }
  const loopDur=t-startTime;

  // ── Bass (triangle, warm) ─ repeat short 2-bar pattern to cover full melody ──
  let bt=startTime;
  let bassBeats=0;
  for(let i=0;i<BASS_NOTES.length;i+=2) bassBeats+=BASS_NOTES[i+1];
  // Ceiling division ensures bass never cuts short before melody ends
  const bassLoops=Math.ceil(melodyBeats/bassBeats);
  for(let rep=0;rep<bassLoops;rep++){
    for(let i=0;i<BASS_NOTES.length;i+=2){
      const freq=BASS_NOTES[i], dur=BASS_NOTES[i+1];
      scheduleNote(ac,freq,bt,dur,'triangle',0.18,masterGain);
      bt+=dur*BEAT;
      if(bt>=startTime+loopDur) break;
    }
  }

  // ── Chord stabs (every 2 beats, jazzy voicing) ──
  const chords=[
    [NOTE.C4,NOTE.E4,NOTE.G4],
    [NOTE.A3,NOTE.C4,NOTE.E4],
    [NOTE.F3,NOTE.A3,NOTE.C4],
    [NOTE.G3,NOTE.B3,NOTE.D4],
  ];
  let ct=startTime;
  let chord=0;
  while(ct<startTime+loopDur-BEAT){
    const ch=chords[chord%chords.length];
    ch.forEach((freq,i)=>{
      scheduleNote(ac,freq,ct+i*0.012,0.6,'triangle',0.04,masterGain);
    });
    chord++;
    ct+=2*BEAT;
  }

  // ── Drums (bossa nova feel: kick on 1&3, snare on 2&4, hats on every half) ──
  const beatsTotal=Math.ceil(melodyBeats);
  for(let b=0;b<beatsTotal;b++){
    const bt2=startTime+b*BEAT;
    // hi-hat every half beat
    scheduleHihat(ac,bt2,0.05,masterGain);
    scheduleHihat(ac,bt2+BEAT*0.5,0.032,masterGain);
    // kick beat 1 and 3
    if(b%4===0||b%4===2) scheduleKick(ac,bt2,masterGain);
    // snare beat 2 and 4
    if(b%4===1||b%4===3) scheduleSnare(ac,bt2,masterGain);
    // extra bossa kick on the "and" of 2
    if(b%4===1) scheduleKick(ac,bt2+BEAT*0.5,masterGain);
  }

  // Fire next schedule 0.3 s before current loop ends to avoid audible gaps
  const scheduleAhead=loopDur-0.3;
  musicLoopTimeout=setTimeout(()=>scheduleLoop(startTime+loopDur), scheduleAhead*1000);
}

/**
 * Toggle BGM mute state.  Uses setTargetAtTime for a 0.3 s fade to prevent
 * clicks/pops from abrupt volume changes.
 */
function toggleMusic(){
  musicMuted=!musicMuted;
  if(masterGain){
    const ac=getAudio();
    masterGain.gain.setTargetAtTime(musicMuted?0:0.55, ac.currentTime, 0.3);
  }
}

/**
 * Play ascending arpeggio on successful order serve.
 * Higher tip level adds an extra note and raises the base pitch,
 * giving auditory feedback on how well the player performed.
 * @param {number} tipLevel - 0=no tip, 1=small tip, 2=big tip.
 */
function playServeSound(tipLevel){
  try{
    const ac=getAudio();
    const base=tipLevel>0?600:500;
    const notes=tipLevel>1?[base,base*1.26,base*1.5,base*2]:[base,base*1.26,base*1.5];
    notes.forEach((freq,i)=>{
      const osc=ac.createOscillator();
      const gain=ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,ac.currentTime+i*0.08);
      gain.gain.setValueAtTime(0,ac.currentTime+i*0.08);
      gain.gain.linearRampToValueAtTime(0.18,ac.currentTime+i*0.08+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.08+0.5);
      osc.start(ac.currentTime+i*0.08);
      osc.stop(ac.currentTime+i*0.08+0.6);
    });
  }catch(e){}
}

/** Short rising-pitch blip confirming an ingredient was added to the cup. */
function playStepSound(){
  try{
    const ac=getAudio();
    const osc=ac.createOscillator();
    const gain=ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type='square';
    osc.frequency.setValueAtTime(220,ac.currentTime);
    osc.frequency.linearRampToValueAtTime(330,ac.currentTime+0.06);
    gain.gain.setValueAtTime(0.07,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);
    osc.start(ac.currentTime); osc.stop(ac.currentTime+0.18);
  }catch(e){}
}

/** Descending sawtooth buzz for wrong-order or insufficient-funds feedback. */
function playErrorSound(){
  try{
    const ac=getAudio();
    const osc=ac.createOscillator();
    const gain=ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(180,ac.currentTime);
    osc.frequency.linearRampToValueAtTime(100,ac.currentTime+0.15);
    gain.gain.setValueAtTime(0.08,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2);
    osc.start(ac.currentTime); osc.stop(ac.currentTime+0.22);
  }catch(e){}
}
// ─────────────────────────────────────────────────────────────
// GAME STATE
// G is the single source of truth for all runtime state.
// The state string drives the main loop's branch selection.
//   'title'    – animated start screen
//   'tutorial' – guided 16-step tutorial (no timer)
//   'game'     – active gameplay
//   'score'    – end-of-day summary screen
//   'shop'     – decoration upgrade shop between days
// ─────────────────────────────────────────────────────────────
const G={
  state:'title', // title|tutorial|game|score|shop
  day:1, score:0, money:0, combo:0,
  queue:[], maxQueue:4,
  currentOrder:null,
  /** Per-station flash timers (key=stationId, val=frames remaining) and
   *  per-step fill animation heights (key='fill_'+stepId, val=pixels). */
  station:{},
  heldItem:null,       // unused; drag object handles held ingredient
  particles:[],        // active Particle objects {x,y,dx,dy,life,col,size}
  floatTexts:[],       // active FloatText objects {txt,x,y,vy,life,col}
  timer:0, maxTimer:90,
  dayScore:0, ordersComplete:0,
  bubble:null,         // reserved for future bubble effects
  decorations:new Set(), // Set of owned decoration ids (persists across days)
  totalMoney:0,          // lifetime earnings (informational, not spent from here)
};

  tutorialOrderPlaced:false,
  arrowBlink:0,
};

// ─────────────────────────────────────────────────────────────
// DRINKS MENU
// Recipes are defined as ordered step arrays.  The player must
// apply ingredients in the exact sequence listed — wrong order
// triggers an error.  `foamColor` is the colour rendered for
// foam/steam_milk layers; null means no foam cap.
// ─────────────────────────────────────────────────────────────
const DRINKS={
  espresso:{name:'ESPRESSO',steps:['grind','espresso'],color:'#1a0800',foamColor:null,label:'☕',price:3},
  latte:{name:'LATTE',steps:['grind','espresso','steam_milk'],color:'#c8814a',foamColor:'#fff8ee',label:'🥛',price:5},

  mocha:{name:'MOCHA',steps:['grind','espresso','chocolate','steam_milk'],color:'#3d1a0e',foamColor:'#c87820',label:'🍫',price:6},
  caramel_latte:{name:'CARAMEL LATTE',steps:['grind','espresso','caramel','steam_milk'],color:'#c87820',foamColor:'#f5c842',label:'🍮',price:7},
  cold_brew:{name:'COLD BREW',steps:['grind','cold_brew','ice'],color:'#1a0a00',foamColor:null,label:'🧊',price:6},
};

const DRINK_KEYS=Object.keys(DRINKS);

// ─────────────────────────────────────────────────────────────
// STATIONS
// The 8 drag-source panels arranged 4 on the left edge and
// 4 on the right edge of the canvas.
//   action – the step string this station adds to buildSteps
//   needs  – optional prerequisite step that must already be in
//             buildSteps before this station can be used
//             (e.g. espresso requires 'grind' first)
//   col    – background colour for the panel widget
// ─────────────────────────────────────────────────────────────
// Left column (x~10) and right column (x~800), 4 each side
const STATION_W=90, STATION_H=66;
const STATIONS=[
  {id:'grinder',  x:10,  y:300, w:STATION_W, h:STATION_H, label:'GRINDER',  icon:'⚙️', action:'grind',      col:'#3d2010'},
  {id:'espresso', x:10,  y:372, w:STATION_W, h:STATION_H, label:'ESPRESSO', icon:'☕', action:'espresso',   col:'#2a1008', needs:'grind'},
  {id:'steamer',  x:10,  y:444, w:STATION_W, h:STATION_H, label:'STEAMER',  icon:'💨', action:'steam_milk', col:'#1a2a3a'},
  {id:'foamer',   x:10,  y:516, w:STATION_W, h:STATION_H, label:'FOAMER',   icon:'☁️', action:'foam',       col:'#2a2a3a'},
  {id:'choc',     x:800, y:300, w:STATION_W, h:STATION_H, label:'CHOCO',    icon:'🍫', action:'chocolate',  col:'#1a0800'},
  {id:'caramel',  x:800, y:372, w:STATION_W, h:STATION_H, label:'CARAMEL',  icon:'🍮', action:'caramel',    col:'#2a1800'},
  {id:'ice',      x:800, y:444, w:STATION_W, h:STATION_H, label:'ICE',      icon:'🧊', action:'ice',        col:'#0a1a2a'},
  {id:'cold',     x:800, y:516, w:STATION_W, h:STATION_H, label:'COLD BREW',icon:'🫙', action:'cold_brew',  col:'#0d0800', needs:'grind'},

/** Centre of the large interactive cup in canvas space. */
const CUP_CX=450, CUP_CY=500;
/** Pixel dimensions of the large cup widget. */
const CUP_W=100, CUP_H=120;

// ─────────────────────────────────────────────────────────────
// BUILD STATE
// buildSteps tracks which recipe steps have been applied to the
// current in-progress cup.  activeDrink holds the drink key so
// both the recipe definition and the visual cup colour can be
// looked up from DRINKS.
// ─────────────────────────────────────────────────────────────
let buildSteps=[];   // ordered list of completed step strings
let activeDrink=null; // key into DRINKS, or null when no order active

// ─────────────────────────────────────────────────────────────
// INGREDIENT DRAG STATE
// A single drag object tracks one in-flight ingredient token.
// Two animation phases exist:
//   active   – token follows the pointer (player is holding it)
//   flying   – token arcs toward the cup on successful drop;
//              a parabolic offset (sin curve) is applied to y so
//              the token curves rather than travelling in a line.
// ─────────────────────────────────────────────────────────────
const drag={
  active:false,
  station:null,     // STATIONS entry being dragged from
  x:0, y:0,        // current drag position
  startX:0, startY:0,
  offsetX:0, offsetY:0,
  // splash animation when dropped
  splashing:false,
  splashTimer:0,
  splashMax:45,
  splashX:0, splashY:0,
  splashAction:null,
  // flying-in arc animation
  flying:false,
  flyTimer:0,
  flyMax:30,
  flyFromX:0, flyFromY:0,
};

/**
 * Clear all drag/animation state and remove liquid-fill entries from G.station.
 * Called when an order is served, cancelled, or a customer walks out.
 */
function resetCup(){
  drag.active=false;
  drag.flying=false;
  drag.splashing=false;
  drag.station=null;
  // Remove fill animation keys; non-prefixed keys are station flash timers and must stay
  Object.keys(G.station).forEach(k=>{ if(k.startsWith('fill_')) delete G.station[k]; });
}

// ─────────────────────────────────────────────────────────────
// CUSTOMERS
// Customer appearance is procedurally generated from palette
// arrays.  patienceRate controls how fast patience drains each
// frame; it scales with day number and is reduced by owned
// decorations (clamped to a minimum of 0.004 so the game
// remains winnable even without upgrades).
// ─────────────────────────────────────────────────────────────
const NAMES=['ALEX','MIRA','JAKE','LUNA','OMAR','ZARA','KAI','NORA'];
const HAIR_COLORS=['#1a0a00','#3d1a00','#c87820','#e8c870','#8b4040','#2a3a5a','#cc6688'];
const HAIR_STYLES=['short','long','curly','mohawk','bun','cap'];
const PANTS_COLORS=['#2a3a6a','#1a2a1a','#3a1a1a','#2a2a2a','#5a3a1a'];
const ACCESSORIES=['none','none','none','glasses','earring','hat'];

/**
 * Factory: generate a new Customer object with random appearance and drink.
 * patienceRate = baseRate − decorationBonus, clamped to 0.004 minimum.
 * baseRate grows by 0.002 per day, making later days progressively harder.
 * @returns {Object} Customer data object.
 */
function makeCustomer(){
  const dk=DRINK_KEYS[Math.floor(Math.random()*DRINK_KEYS.length)];
  // Accumulate patience bonus from all owned decorations
  let bonus=0;
  G.decorations.forEach(id=>{
    const item=SHOP_ITEMS.find(s=>s.id===id);
    if(item) bonus+=item.bonus;
  });
  const baseRate=0.018+G.day*0.002;
  return {
    name:NAMES[Math.floor(Math.random()*NAMES.length)],
    drink:dk,
    drinkData:DRINKS[dk],
    patience:100,
    patienceMax:100,
    patienceRate:Math.max(baseRate-bonus, 0.004),
    x:920, tx:0, y:255, // x starts off-screen right; slides to queue slot tx
    skin:[P.customer1,P.customer2,P.customer3][Math.floor(Math.random()*3)],
    color:[P.customer1,P.customer2,P.customer3][Math.floor(Math.random()*3)], // keep for compat
    shirt:[P.shirt1,P.shirt2,P.shirt3][Math.floor(Math.random()*3)],
    pants:PANTS_COLORS[Math.floor(Math.random()*PANTS_COLORS.length)],
    hairColor:HAIR_COLORS[Math.floor(Math.random()*HAIR_COLORS.length)],
    hairStyle:HAIR_STYLES[Math.floor(Math.random()*HAIR_STYLES.length)],
    accessory:ACCESSORIES[Math.floor(Math.random()*ACCESSORIES.length)],
    done:false,
    expression:'meh',
    slideIn:true,
  };
}

// ─────────────────────────────────────────────────────────────
// PIXEL DRAWING HELPERS
// Thin wrappers around Canvas 2D fill/stroke calls.
// Using Math.round on coordinates keeps rendering crisp on the
// pixelated canvas (imageSmoothingEnabled=false).
// ─────────────────────────────────────────────────────────────
/** Fill an axis-aligned rectangle with pixel-snapped coordinates. */
function pixRect(x,y,w,h,col){
  ctx.fillStyle=col;
  ctx.fillRect(Math.round(x),Math.round(y),w,h);
}
/** Draw pixel-font text with the Press Start 2P typeface. */
function pixText(txt,x,y,col,size=8,align='left'){
  ctx.font=`${size}px 'Press Start 2P'`;
  ctx.fillStyle=col;
  ctx.textAlign=align;
  ctx.fillText(txt,Math.round(x),Math.round(y));
}
/** Draw a filled rectangle with a centred stroke outline (UI panel style). */
function pixOutlineRect(x,y,w,h,fill,stroke,sw=2){
  ctx.fillStyle=fill; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=stroke; ctx.lineWidth=sw; ctx.strokeRect(x+sw/2,y+sw/2,w-sw,h-sw);
}

// ─────────────────────────────────────────────────────────────
// STATION RENDERING
// ─────────────────────────────────────────────────────────────
/**
 * Draw a single ingredient station panel.
 * Visual states (combined freely):
 *   hover  – slightly lighter background on mouse-over
 *   isNext – gold pulsing glow + inward arrow; marks the next
 *            required step so players always know what to grab
 *   isDone – green tint + checkmark once step is complete
 * Station flash (G.station[s.id] > 0) plays a brief amber
 * overlay that counts down each frame to give action feedback.
 * @param {Object}  s       - Entry from STATIONS array.
 * @param {boolean} hover   - Pointer is over this station.
 * @param {boolean} isNext  - This is the next needed ingredient.
 * @param {boolean} isDone  - Step already completed for current drink.
 */
function drawStation(s, hover, isNext=false, isDone=false){
  // Background panel
  const col = isDone ? '#1a2a10' : hover ? '#6a3510' : s.col||P.btn;
  pixOutlineRect(s.x, s.y, s.w, s.h, col, isDone?'#4a8a20':isNext?'#f5c842':'#7a4520', isNext?3:2);

  // top accent strip
  pixRect(s.x+3, s.y+3, s.w-6, 5, 'rgba(255,255,255,0.07)');

  // emoji icon (large)
  ctx.font='28px serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(s.icon, s.x+s.w/2, s.y+s.h/2-8);
  ctx.textBaseline='alphabetic';

  // label
  pixText(s.label, s.x+s.w/2, s.y+s.h-8, isDone?'#8dc870':P.cream, 6, 'center');

  // done checkmark
  if(isDone){
    ctx.fillStyle='rgba(100,200,60,0.25)';
    ctx.fillRect(s.x,s.y,s.w,s.h);
    pixText('✓', s.x+s.w-10, s.y+14, '#8dc870', 9, 'center');
  }

  // pulsing gold glow for next needed
  if(isNext && !isDone){
    const pulse=0.4+0.4*Math.sin(Date.now()/180);
    ctx.strokeStyle=`rgba(255,220,50,${pulse})`;
    ctx.lineWidth=3;
    ctx.strokeRect(s.x-3, s.y-3, s.w+6, s.h+6);
    ctx.fillStyle=`rgba(255,220,50,${pulse*0.12})`;
    ctx.fillRect(s.x, s.y, s.w, s.h);
    // arrow pointing inward toward center
    const arrowX = s.x > 400 ? s.x-14 : s.x+s.w+14;
    const arrowChar = s.x > 400 ? '◀' : '▶';
    const ay=s.y+s.h/2+4;
    pixText(arrowChar, arrowX, ay, `rgba(255,220,50,${pulse})`, 11, 'center');
  }

  // flash when just used
  if(G.station[s.id]>0){
    ctx.fillStyle=`rgba(255,200,80,${G.station[s.id]/30*0.35})`;
    ctx.fillRect(s.x,s.y,s.w,s.h);
  }
}

// ─────────────────────────────────────────────────────────────
// CUP RENDERING (small — used in thought bubbles and queue)
// ─────────────────────────────────────────────────────────────
/**
 * Draw a small cup showing drink fill progress.
 * Fill height is proportional to steps completed / total steps.
 * @param {number} x,y   - Centre-bottom position.
 * @param {string} drink - Key into DRINKS; null draws an empty cup.
 * @param {Array}  steps - Completed steps for fill level.
 * @param {number} size  - Scale multiplier (1=normal, 0.62=thought-bubble size).
 */
function drawCup(x,y,drink,steps,size=1){
  const W=28*size, H=36*size;
  // cup body
  pixRect(x-W/2,y-H,W,H,P.cup);
  pixRect(x-W/2,y-H,2,H,P.cupDark);
  pixRect(x+W/2-2,y-H,2,H,P.cupDark);
  pixRect(x-W/2,y-2,W,2,P.cupDark);
  if(!drink) return;
  const d=DRINKS[drink];
  if(!d) return;
  // fill level based on steps
  const stepsDone=steps.length;
  const stepsNeeded=d.steps.length;
  const fillH=Math.round((stepsDone/stepsNeeded)*(H-4));
  if(fillH>0){
    pixRect(x-W/2+2,y-2-fillH,W-4,fillH,d.color);
  }
  // foam
  if(steps.includes('foam')||steps.includes('steam_milk')){
    pixRect(x-W/2+2,y-2-fillH,W-4,4,d.foamColor||P.milk);
  }
  // caramel drizzle
  if(steps.includes('caramel')){
    ctx.fillStyle=P.caramel;
    for(let i=0;i<3;i++) ctx.fillRect(x-8+i*8,y-H+6,2,fillH-4);
  }
  // ice
  if(steps.includes('ice')){
    ctx.fillStyle='rgba(180,230,255,0.6)';
    ctx.fillRect(x-8,y-12,6,8);
    ctx.fillRect(x+2,y-16,6,8);
  }
  // steam
  if(steps.includes('espresso')||steps.includes('steam_milk')){
    drawSteam(x,y-H-4,size);
  }
}

/**
 * Draw animated rising steam wisps above the cup.
 * Each wisp oscillates horizontally using sin(time + phaseOffset).
 */
function drawSteam(x,y,s=1){
  for(let i=0;i<3;i++){
    const t=Date.now()/600+i*0.8;
    const ox=Math.sin(t)*4*s;
    ctx.fillStyle=`rgba(255,255,255,${0.08+Math.sin(t)*0.04})`;
    ctx.fillRect(x-4*s+ox+i*6*s,y-12*s*(i%2),2,8*s);
  }
}

// ─────────────────────────────────────────────────────────────
// CUSTOMER RENDERING
// Customers are drawn bottom-up: shoes → legs → torso → arms
// → head → hair → accessory → thought bubble → patience bar.
// Eye iris colour shifts from blue (calm) to red (impatient)
// below 50% patience.  Mouth expression has three states:
//   >65% patience  → smile with teeth
//   35–65%         → neutral line
//   <35%           → frown
// ─────────────────────────────────────────────────────────────
/**
 * Draw a full customer sprite and their thought bubble UI.
 * @param {Object} cust - Customer object from G.queue.
 * @param {number} cx   - Horizontal centre in canvas pixels.
 * @param {number} idx  - Queue index; used to detect active order highlight.
 */
function drawCustomer(cust, cx, idx){
  const x=cx, y=cust.y;
  const active=(G.currentOrder===idx);
  const pat=cust.patience/cust.patienceMax;
  const skin=cust.skin||cust.color;
  const hc=cust.hairColor||'#1a0a00';
  const pants=cust.pants||'#2a3a6a';
  const shirt=cust.shirt;

  // ── SHOES ──
  pixRect(x-13,y-4,11,7,'#1a1a1a');   // left shoe
  pixRect(x+3,y-4,11,7,'#1a1a1a');    // right shoe
  pixRect(x-13,y-4,11,3,'#2a2a2a');   // shoe highlight

  // ── LEGS ──
  pixRect(x-12,y-28,10,24,pants);     // left leg
  pixRect(x+2,y-28,10,24,pants);      // right leg
  // trouser crease shading
  pixRect(x-4,y-28,2,22,'rgba(0,0,0,0.15)');
  pixRect(x+2,y-28,2,22,'rgba(0,0,0,0.15)');

  // ── BODY / TORSO ──
  pixRect(x-14,y-68,28,40,shirt);
  // shirt shading — darker on sides
  pixRect(x-14,y-68,4,40,'rgba(0,0,0,0.18)');
  pixRect(x+10,y-68,4,40,'rgba(0,0,0,0.18)');
  // shirt highlight strip
  pixRect(x-2,y-68,4,40,'rgba(255,255,255,0.1)');
  // collar
  pixRect(x-5,y-68,10,5,skin);
  pixRect(x-3,y-68,6,3,'rgba(0,0,0,0.1)');

  // ── ARMS ──
  // left arm (slightly in front)
  pixRect(x-20,y-66,8,22,shirt);
  pixRect(x-20,y-66,3,22,'rgba(0,0,0,0.15)');
  // left hand
  pixRect(x-20,y-46,8,10,skin);
  // right arm
  pixRect(x+12,y-66,8,22,shirt);
  pixRect(x+17,y-66,3,22,'rgba(0,0,0,0.15)');
  // right hand
  pixRect(x+12,y-46,8,10,skin);

  // ── HEAD ──
  const hy=y-100;
  // head shadow under chin
  pixRect(x-13,y-72,26,6,'rgba(0,0,0,0.12)');
  // main head
  pixRect(x-13,hy,26,30,skin);
  // head shading — right side darker
  pixRect(x+8,hy,5,30,'rgba(0,0,0,0.12)');
  // forehead highlight
  pixRect(x-10,hy+2,8,6,'rgba(255,255,255,0.18)');
  // ears
  pixRect(x-16,hy+10,4,8,skin);
  pixRect(x+13,hy+10,4,8,skin);
  pixRect(x-16,hy+12,3,4,'rgba(0,0,0,0.1)');

  // ── EYES ──
  const ey=hy+11;
  // eye whites
  pixRect(x-9,ey,8,7,'#fff8f0');
  pixRect(x+2,ey,8,7,'#fff8f0');
  // irises — color varies by patience
  // Iris colour shifts: blue when happy, red when frustrated
  const irisCol=pat>0.5?'#3a6aaa':'#aa4a3a';
  pixRect(x-7,ey+1,4,5,irisCol);
  pixRect(x+4,ey+1,4,5,irisCol);
  // pupils
  pixRect(x-6,ey+2,2,3,'#0a0500');
  pixRect(x+5,ey+2,2,3,'#0a0500');
  // eye shine
  pixRect(x-6,ey+2,1,1,'#fff');
  pixRect(x+5,ey+2,1,1,'#fff');
  // upper eyelid line
  pixRect(x-9,ey,8,2,'rgba(0,0,0,0.3)');
  pixRect(x+2,ey,8,2,'rgba(0,0,0,0.3)');

  // ── NOSE ──
  pixRect(x-1,ey+8,3,2,'rgba(0,0,0,0.2)');

  // ── MOUTH ──
  const my2=hy+22;
  if(pat>0.65){
    // big smile
    pixRect(x-6,my2,12,2,'#5a1a1a');
    pixRect(x-8,my2-2,2,2,'#5a1a1a');
    pixRect(x+6,my2-2,2,2,'#5a1a1a');
    pixRect(x-6,my2,3,3,'#f5d0c0'); // teeth peek
    pixRect(x-2,my2,3,3,'#f5d0c0');
    pixRect(x+2,my2,3,3,'#f5d0c0');
  } else if(pat>0.35){
    // neutral
    pixRect(x-5,my2,10,2,'#5a1a1a');
  } else {
    // frown
    pixRect(x-6,my2,12,2,'#5a1a1a');
    pixRect(x-8,my2+2,2,2,'#5a1a1a');
    pixRect(x+6,my2+2,2,2,'#5a1a1a');
  }
  // cheek blush (happy)
  if(pat>0.65){
    ctx.fillStyle='rgba(255,120,100,0.2)';
    ctx.fillRect(x-11,my2-3,6,5);
    ctx.fillRect(x+6,my2-3,6,5);
  }

  // ── HAIR ──
  const hs=cust.hairStyle||'short';
  if(hs==='short'){
    pixRect(x-13,hy,26,8,hc);
    pixRect(x-15,hy+4,4,8,hc);
    pixRect(x+11,hy+4,4,8,hc);
    pixRect(x-13,hy,26,3,'rgba(255,255,255,0.12)');
  } else if(hs==='long'){
    pixRect(x-13,hy,26,8,hc);
    pixRect(x-15,hy+2,5,28,hc);   // left side falls
    pixRect(x+10,hy+2,5,28,hc);   // right side falls
    pixRect(x-15,hy+2,2,28,'rgba(255,255,255,0.1)');
    pixRect(x-13,hy,26,3,'rgba(255,255,255,0.12)');
  } else if(hs==='curly'){
    pixRect(x-14,hy,28,10,hc);
    pixRect(x-16,hy+2,5,14,hc);
    pixRect(x+11,hy+2,5,14,hc);
    pixRect(x-12,hy-4,6,6,hc);
    pixRect(x-4,hy-6,8,6,hc);
    pixRect(x+6,hy-4,6,6,hc);
    // curly texture
    pixRect(x-10,hy+2,3,3,'rgba(255,255,255,0.15)');
    pixRect(x+4,hy,3,3,'rgba(255,255,255,0.15)');
  } else if(hs==='mohawk'){
    pixRect(x-13,hy,26,5,hc);
    pixRect(x-3,hy-14,6,16,hc);   // spike
    pixRect(x-5,hy-10,2,12,hc);
    pixRect(x+3,hy-10,2,12,hc);
    pixRect(x-2,hy-14,2,3,'rgba(255,255,255,0.25)');
  } else if(hs==='bun'){
    pixRect(x-13,hy,26,6,hc);
    pixRect(x-15,hy+3,4,10,hc);
    pixRect(x+11,hy+3,4,10,hc);
    // bun on top
    ctx.fillStyle=hc;
    ctx.beginPath(); ctx.arc(x,hy-4,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(x-2,hy-6,3,0,Math.PI*2); ctx.fill();
  } else if(hs==='cap'){
    // baseball cap
    pixRect(x-13,hy+4,26,6,'#3a2a5a');   // band
    pixRect(x-12,hy-2,24,8,'#4a3a7a');   // dome
    pixRect(x-16,hy+8,30,4,'#3a2a5a');   // brim
    pixRect(x-12,hy-2,8,3,'rgba(255,255,255,0.1)');
  }

  // ── ACCESSORY ──
  const acc=cust.accessory||'none';
  if(acc==='glasses'){
    ctx.strokeStyle='#3a2a10'; ctx.lineWidth=1.5;
    ctx.strokeRect(x-10,ey,8,7);
    ctx.strokeRect(x+2,ey,8,7);
    pixRect(x-2,ey+3,4,2,'#3a2a10');  // bridge
    pixRect(x-14,ey+3,4,2,'#3a2a10'); // left arm
    pixRect(x+10,ey+3,4,2,'#3a2a10'); // right arm
  } else if(acc==='earring'){
    ctx.fillStyle='#f5c842';
    ctx.beginPath(); ctx.arc(x-14,hy+18,3,0,Math.PI*2); ctx.fill();
  } else if(acc==='hat'){
    // top hat  
    pixRect(x-10,hy-14,20,6,'#2a1a3a');
    pixRect(x-7,hy-8,14,8,'#2a1a3a');
    pixRect(x-13,hy-2,26,3,'#2a1a3a');
    pixRect(x-10,hy-12,4,3,'rgba(255,255,255,0.12)');
  }

  // ── THOUGHT BUBBLE ──
  const bw=90, bh=76;
  const tbx=x-bw/2, tby=y-100-bh-16;
  if(active){
    ctx.fillStyle='rgba(255,200,50,0.18)';
    ctx.fillRect(tbx-4,tby-4,bw+8,bh+8);
    ctx.strokeStyle=P.score; ctx.lineWidth=2;
    ctx.strokeRect(tbx-4,tby-4,bw+8,bh+8);
  }
  // bubble with rounded feel via stacked rects
  pixRect(tbx+4,tby,bw-8,bh,P.thought);
  pixRect(tbx,tby+4,bw,bh-8,P.thought);
  pixRect(tbx+2,tby+2,bw-4,bh-4,P.thought);
  ctx.strokeStyle='#c4a87a'; ctx.lineWidth=2;
  ctx.strokeRect(tbx+2,tby+2,bw-4,bh-4);
  // bubble tail
  pixRect(x-4,tby+bh,6,5,P.thought);
  pixRect(x-3,tby+bh+5,4,4,P.thought);
  pixRect(x-2,tby+bh+9,3,3,P.thought);

  pixText(cust.drinkData.name,x,tby+14,P.espresso,6,'center');
  ctx.font='26px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(cust.drinkData.label, x, tby+38);
  ctx.textBaseline='alphabetic';
  drawCup(x,tby+bh-4,cust.drink,[],0.62);

  // ── PATIENCE BAR ──
  const pbw=bw, pbx=tbx;
  const pby=tby+bh+14;
  pixRect(pbx,pby,pbw,8,'#1a0000');
  const pCol=pat>0.6?P.good:pat>0.3?P.caramel:P.bad;
  pixRect(pbx,pby,Math.round(pbw*pat),8,pCol);
  // bar shine
  pixRect(pbx,pby,Math.round(pbw*pat),3,'rgba(255,255,255,0.2)');
  ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.strokeRect(pbx,pby,pbw,8);

  pixText(cust.name,x,pby+18,active?P.caramel:P.cream,6,'center');

  if(!active && Math.floor(Date.now()/700)%2===0)
    pixText('TAP',x,tby-10,P.score,7,'center');
}

/**
 * Return the hit-test rectangle for a customer's thought bubble.
 * Slightly larger than the visual bubble (+6 px on all sides) for
 * a forgiving click target on mobile.
 * @returns {{x1,y1,x2,y2}} Axis-aligned bounding box in canvas pixels.
 */
function customerBubbleBounds(cust){
  const bw=90, bh=76;
  const tbx=cust.x-bw/2, tby=cust.y-100-bh-16;
  return {x1:tbx-6, y1:tby-6, x2:tbx+bw+6, y2:tby+bh+22};
}

// ─────────────────────────────────────────────────────────────
// PARTICLES & FLOATING TEXT
// Particles use simple Euler integration: position += velocity
// each frame, with a constant downward gravity of +0.1 px/frame.
// life starts at 1.0 and is used as the globalAlpha value,
// so particles naturally fade as they age.
// ─────────────────────────────────────────────────────────────
/**
 * Spawn n square particles in a random radial burst.
 * @param {string} col - CSS colour string for all particles in this burst.
 * @param {number} n   - Particle count.
 */
function spawnParticles(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const sp=1+Math.random()*3;
    G.particles.push({x,y,dx:Math.cos(a)*sp,dy:Math.sin(a)*sp-2,life:1,col,size:3+Math.random()*4});
  }
}

/**
 * Spawn a floating score/feedback label that drifts upward and fades.
 * vy=-1.5 means it rises 1.5 px per frame; life decays at 0.025/frame
 * giving ~40 frames (~0.67 s at 60 fps) of visibility.
 */
function addFloat(txt,x,y,col){
  G.floatTexts.push({txt,x,y:y,vy:-1.5,life:1,col});
}

// ─────────────────────────────────────────────────────────────
// LARGE INTERACTIVE CUP
// The centred cup shows the in-progress drink being assembled.
// Each completed step animates its liquid layer upward using
// G.station['fill_'+step] as a growing pixel height value
// (incremented by 5 px/frame until it reaches layerH).
// The splash animation plays a radial ring + 8 arc drops when
// an ingredient lands.  The Serve button appears only when all
// steps are complete.
// ─────────────────────────────────────────────────────────────
/**
 * Draw the large centred cup showing the current build progress,
 * liquid fill animations, foam cap, splash effect, step indicators,
 * and the Serve button when the recipe is complete.
 */
function drawCenteredCup(){
  if(!activeDrink) return;
  const d=DRINKS[activeDrink];
  const cx=CUP_CX, cy=CUP_CY;
  const W=CUP_W, H=CUP_H;

  // Saucer
  pixRect(cx-W/2-12, cy+4, W+24, 10, P.cupDark);
  pixRect(cx-W/2-16, cy+8, W+32, 6, P.cup);

  // Cup shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(cx-W/2+6, cy+6, W, 10);

  // Cup body
  pixRect(cx-W/2, cy-H, W, H+4, P.cup);
  // side shading
  pixRect(cx-W/2, cy-H, 8, H+4, P.cupDark);
  pixRect(cx+W/2-8, cy-H, 8, H+4, P.cupDark);
  // bottom rim
  pixRect(cx-W/2, cy, W, 6, P.cupDark);

  // Divide the cup interior equally among all required steps so
  // each completed ingredient occupies the same visual band height
  const totalSteps=d.steps.length;
  const maxFillH=H-8;
  const layerH=Math.floor(maxFillH/totalSteps);
  d.steps.forEach((step,i)=>{
    if(!buildSteps.includes(step)) return;
    let col=d.color;
    if(step==='steam_milk'||step==='foam') col=d.foamColor||P.milk;
    if(step==='chocolate') col='#2a0a00';
    if(step==='caramel') col=P.caramel;
    if(step==='ice') col='rgba(180,230,255,0.85)';
    if(step==='grind') col='#1a0600';
    if(step==='cold_brew') col='#0d0400';
    const fillKey='fill_'+step;
    if(!G.station[fillKey]) G.station[fillKey]=0;
    G.station[fillKey]=Math.min(G.station[fillKey]+5, layerH);
    const fh=G.station[fillKey];
    const layerTop=cy-4-(i+1)*layerH;
    pixRect(cx-W/2+8, layerTop+(layerH-fh), W-16, fh, col);
    // caramel drizzle
    if(step==='caramel'){
      ctx.fillStyle='#d07010';
      for(let j=0;j<4;j++) ctx.fillRect(cx-W/2+14+j*18, layerTop, 3, fh);
    }
    // ice cubes
    if(step==='ice'){
      ctx.fillStyle='rgba(220,245,255,0.8)';
      ctx.fillRect(cx-22, cy-18, 16, 14); ctx.fillRect(cx+6, cy-22, 14, 12);
      ctx.strokeStyle='rgba(160,210,240,0.5)'; ctx.lineWidth=1;
      ctx.strokeRect(cx-22,cy-18,16,14); ctx.strokeRect(cx+6,cy-22,14,12);
    }
  });

  // Foam cap
  if(buildSteps.includes('foam')||buildSteps.includes('steam_milk')){
    const nDone=buildSteps.filter(s=>d.steps.includes(s)).length;
    const foamY=cy-4-nDone*layerH;
    pixRect(cx-W/2+8, foamY-10, W-16, 14, d.foamColor||P.milk);
    ctx.fillStyle='rgba(255,255,255,0.65)';
    for(let j=0;j<7;j++) ctx.fillRect(cx-W/2+12+j*12, foamY-8, 8, 8);
  }

  // Cup outline on top
  ctx.strokeStyle=P.cupDark; ctx.lineWidth=4;
  ctx.strokeRect(cx-W/2, cy-H, W, H+4);

  // Handle
  pixRect(cx+W/2, cy-H+18, 18, 7, P.cupDark);
  pixRect(cx+W/2, cy-22, 18, 7, P.cupDark);
  pixRect(cx+W/2+14, cy-H+18, 6, H-36, P.cupDark);

  // Steam
  if(buildSteps.includes('espresso')||buildSteps.includes('steam_milk')){
    for(let i=0;i<5;i++){
      const t=Date.now()/500+i*1.2;
      ctx.fillStyle=`rgba(255,255,255,${0.08+Math.sin(t)*0.04})`;
      ctx.fillRect(cx-24+i*14+Math.sin(t)*8, cy-H-10-i*10, 5,14);
    }
  }

  // Splash animation
  if(drag.splashing){
    const p=1-drag.splashTimer/drag.splashMax;
    const splashCols={grind:'#3d1a00',espresso:'#1a0800',steam_milk:P.milk,foam:P.milk,
                      chocolate:'#2a0800',caramel:P.caramel,ice:'rgba(180,230,255,0.8)',cold_brew:'#0d0400'};
    const sc=splashCols[drag.splashAction]||d.color;
    // ripple ring
    ctx.strokeStyle=sc; ctx.lineWidth=3;
    ctx.globalAlpha=1-p;
    ctx.beginPath(); ctx.arc(cx, cy-H+10, 20+p*30, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
    // splash drops
    for(let i=0;i<8;i++){
      const a=i*Math.PI/4+p*2;
      const r=p*40;
      ctx.fillStyle=sc;
      ctx.globalAlpha=(1-p)*0.9;
      ctx.fillRect(cx+Math.cos(a)*r-3, cy-H+Math.sin(a)*r*0.4, 6, 6);
    }
    ctx.globalAlpha=1;
    drag.splashTimer--;
    if(drag.splashTimer<=0) drag.splashing=false;
  }

  // Drink name + step progress below cup
  pixText(d.name, cx, cy+30, P.caramel, 9, 'center');
  const done=buildSteps.filter(s=>d.steps.includes(s)).length;
  const total=d.steps.length;
  // step dots
  for(let i=0;i<total;i++){
    const dx=cx-(total-1)*12+i*24;
    ctx.fillStyle=i<done?P.good:'#3a1800';
    ctx.beginPath(); ctx.arc(dx, cy+44, 7, 0, Math.PI*2); ctx.fill();
    if(i<done){ pixText('✓', dx, cy+48, '#fff', 7, 'center'); }
    else {
      ctx.font='10px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(STATIONS.find(s=>s.action===d.steps[i])?.icon||'?', dx, cy+44);
      ctx.textBaseline='alphabetic';
    }
  }

  // Serve button when complete
  if(done===total){
    const bx=cx-75, by=cy+56, bw=150, bh=36;
    const bHov=mouseX>=bx&&mouseX<=bx+bw&&mouseY>=by&&mouseY<=by+bh;
    const pulse=0.5+0.5*Math.sin(Date.now()/220);
    pixOutlineRect(bx, by, bw, bh, bHov?'#2a6a10':'#1a4a08', `rgba(100,220,60,${pulse})`, 2);
    pixText('☕ SERVE!', cx, by+bh-10, '#c8ff80', 10, 'center');
  }
}

// ─────────────────────────────────────────────────────────────
// INGREDIENT DRAG RENDERING
// ─────────────────────────────────────────────────────────────
/**
 * Draw the ingredient token that follows the pointer (active phase)
 * or arcs toward the cup (flying phase).
 * Flying arc: linear x/y interpolation + a sin(progress*π) vertical
 * offset of 60 px so the token curves up then down into the cup.
 */
function drawIngredientDrag(){
  if(!drag.active&&!drag.flying) return;
  const s=drag.station;
  if(!s) return;

  let tx=drag.x, ty=drag.y;
  // Parabolic arc: subtract sin(p*π)*60 so the token peaks mid-flight
  if(drag.flying){
    const p=Math.min(drag.flyTimer/drag.flyMax, 1);
    tx=drag.flyFromX+(CUP_CX-drag.flyFromX)*p;
    ty=drag.flyFromY+(CUP_CY-CUP_H-10-drag.flyFromY)*p - Math.sin(p*Math.PI)*60;
  }

  // Token circle
  const r=26;
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.arc(tx+4, ty+4, r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle=s.col||P.btn;
  ctx.beginPath(); ctx.arc(tx, ty, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,220,100,0.8)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(tx, ty, r, 0, Math.PI*2); ctx.stroke();
  ctx.font='24px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(s.icon, tx, ty);
  ctx.textBaseline='alphabetic';
}

/**
 * Validate and apply a dropped ingredient to the current build.
 * Only the next sequential step in the recipe is accepted; anything
 * else does nothing (error feedback is handled at drop-time in
 * tryDropIngredient).  On success: updates buildSteps, fires the
 * station flash timer, plays audio, spawns particles, and advances
 * the tutorial if in tutorial state.
 * @param {Object} s - The STATIONS entry that was dropped.
 */
function applyIngredient(s){
  if(!activeDrink||G.currentOrder===null) return;
  const d=DRINKS[activeDrink];
  const nextNeeded=d.steps.find(step=>!buildSteps.includes(step));
  if(nextNeeded===s.action){
    buildSteps.push(s.action);
    G.station[s.id]=30;
    playStepSound();
    spawnParticles(CUP_CX, CUP_CY-CUP_H, P.caramel, 10);
    addFloat('+'+s.action.toUpperCase().replace(/_/g,' ')+'!', CUP_CX, CUP_CY-CUP_H-30, P.tip);
    drag.splashing=true;
    drag.splashTimer=drag.splashMax;
    drag.splashAction=s.action;
    // Advance tutorial if this was the expected step
    if(G.state==='tutorial'){
      const ts=getTutStep();
      if(ts&&ts.action==='do_step'&&buildSteps.includes(ts.expectStep)){
        setTimeout(advanceTutorial, 500);
      }
    }
  }
}

/**
 * Draw the café upgrade shop.
 * Cards render in a 3×2 grid.  Owned items show a green banner;
 * affordable items highlight on hover; unaffordable items show the
 * shortfall in grey.  Purchasing deducts from G.money and adds the
 * id to G.decorations immediately so the background updates on the
 * next drawBG() call (visible behind the shop overlay).
 */
function drawShop(){
  // Background — cozy shop view
  pixRect(0,0,900,600,'#1a0f0a');
  drawBG();

  // Dark overlay panel
  ctx.fillStyle='rgba(10,5,0,0.82)';
  ctx.fillRect(30,28,840,548);

  pixText('☕ CAFÉ UPGRADES ☕',450,70,P.caramel,16,'center');
  pixText(`BUDGET: $${G.money}`,450,100,P.score,10,'center');
  pixRect(60,112,780,3,P.wood);

  const cols=3, rows=2;
  const cardW=240, cardH=185, padX=30, padY=22;
  const gridX=60, gridY=128;

  SHOP_ITEMS.forEach((item,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const cx=gridX+col*(cardW+padX);
    const cy=gridY+row*(cardH+padY);
    const owned=G.decorations.has(item.id);
    const canAfford=G.money>=item.price;
    const hover=!owned&&mouseX>=cx&&mouseX<=cx+cardW&&mouseY>=cy&&mouseY<=cy+cardH;

    // Card bg
    const cardCol=owned?'#0a2a0a':hover&&canAfford?'#1a1a3a':'#12080a';
    const borderCol=owned?'#3a8a3a':hover&&canAfford?'#6060c0':'#3d1a00';
    pixOutlineRect(cx,cy,cardW,cardH,cardCol,borderCol,2);

    // Owned banner
    if(owned){
      pixRect(cx,cy,cardW,18,'#1a4a1a');
      pixText('✓ OWNED',cx+cardW/2,cy+13,P.tip,7,'center');
    }

    // Icon
    ctx.font='36px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(item.icon, cx+cardW/2, cy+(owned?52:42));
    ctx.textBaseline='alphabetic';

    // Name
    pixText(item.name, cx+cardW/2, cy+(owned?80:70), P.cream, 8, 'center');

    // Description lines
    item.desc.split('\n').forEach((line,li)=>{
      pixText(line, cx+cardW/2, cy+(owned?98:88)+li*16, '#aaa', 6, 'center');
    });

    // Bonus
    pixText(item.bonusDesc, cx+cardW/2, cy+(owned?130:120), P.tip, 7, 'center');

    // Price / buy button
    if(!owned){
      const btnY=cy+cardH-34;
      const affordable=canAfford;
      pixOutlineRect(cx+20,btnY,cardW-40,26,affordable?'#1a3a60':'#2a1a1a',affordable?'#4a8ad0':'#4a2a2a',1);
      pixText(affordable?`BUY $${item.price}`:`$${item.price} (NEED $${item.price-G.money} MORE)`,
        cx+cardW/2, btnY+18, affordable?P.cream:'#666', affordable?8:6, 'center');
    }
  });

  // Bottom buttons
  const closeHover=mouseX>=310&&mouseX<=590&&mouseY>=528&&mouseY<=568;
  pixOutlineRect(310,528,280,40,closeHover?'#2a1000':'#1a0800',closeHover?'#c07030':'#7a4020',2);
  pixText('▶ START NEXT DAY',450,554,P.cream,9,'center');

  pixText(`TOTAL UPGRADES: ${G.decorations.size}/${SHOP_ITEMS.length}`,450,518,'#555',7,'center');
  drawMuteBtn();
}

// ─────────────────────────────────────────────────────────────
// INPUT HANDLING
// All pointer events are normalised to 900×600 canvas space by
// getCanvasPos() before being dispatched.  Drag (ingredient pickup
// and drop) is handled separately from click so the two don't
// conflict on mobile.
// ─────────────────────────────────────────────────────────────
/**
 * Route a tap/click to the correct handler based on G.state.
 * Always starts music first (satisfies browser autoplay policy
 * which requires audio context resume inside a user gesture).
 * @param {number} mx,my - Canvas-space coordinates.
 */
function handleClick(mx,my){
  startMusic(); // must be inside user gesture to unblock AudioContext

  // Mute button (top-right corner, always available)
  if(mx>=856&&mx<=896&&my>=2&&my<=26){ toggleMusic(); return; }

  if(G.state==='title'){ startTutorial(); return; }
  if(G.state==='score'){
    // Shop button
    if(mx>=140&&mx<=440&&my>=310&&my<=370){ G.state='shop'; return; }
    // Next day button
    if(mx>=460&&mx<=760&&my>=310&&my<=370){ nextDay(); return; }
    return;
  }
  if(G.state==='shop'){
    // Close/next day
    if(mx>=310&&mx<=590&&my>=528&&my<=568){ nextDay(); return; }
    // Buy items
    const cols=3, cardW=240, cardH=185, padX=30, padY=22;
    const gridX=60, gridY=128;
    SHOP_ITEMS.forEach((item,i)=>{
      const col=i%cols, row=Math.floor(i/cols);
      const cx=gridX+col*(cardW+padX);
      const cy=gridY+row*(cardH+padY);
      if(mx>=cx&&mx<=cx+cardW&&my>=cy&&my<=cy+cardH){
        if(!G.decorations.has(item.id)&&G.money>=item.price){
          G.money-=item.price;
          G.decorations.add(item.id);
          playServeSound(2);
          addFloat(''+item.icon+' PURCHASED!',450,300,P.tip);
        } else if(G.decorations.has(item.id)){
          addFloat('ALREADY OWNED!',450,300,'#999');
        } else {
          addFloat('NOT ENOUGH $!',450,300,P.bad);
          playErrorSound();
        }
      }
    });
    return;
  }
  if(G.state==='tutorial'){ handleTutorialClick(mx,my); return; }
  if(G.state!=='game') return;

  // Click customer thought bubble to take order
  G.queue.forEach((cust,i)=>{
    const b=customerBubbleBounds(cust);
    if(mx>=b.x1&&mx<=b.x2&&my>=b.y1&&my<=b.y2){
      G.currentOrder=i;
      activeDrink=cust.drink;
      buildSteps=[];
      resetCup();
    }
  });

  // Serve button (shown when drink complete)
  if(activeDrink){
    const d=DRINKS[activeDrink];
    const done=buildSteps.filter(s=>d.steps.includes(s)).length;
    if(done===d.steps.length){
      const bx=CUP_CX-75, by=CUP_CY+56, bw=150, bh=36;
      if(mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh) serveDrink();
    }
  }
}

/**
 * Complete the current order: validate recipe, calculate earnings,
 * update G.money, remove the customer, and reset build state.
 *
 * Tip tiers based on remaining patience ratio:
 *   >70% → $3 tip   (served quickly)
 *   40–70% → $1 tip (acceptable speed)
 *   <40% → $0 tip   (customer was getting impatient)
 *
 * After removal, the next customer in queue automatically becomes
 * active so the player can chain orders without re-selecting.
 */
function serveDrink(){
  if(G.currentOrder===null||!activeDrink) return;
  const cust=G.queue[G.currentOrder];
  if(!cust) return;
  const d=DRINKS[activeDrink];
  // check completeness
  const allDone=d.steps.every(step=>buildSteps.includes(step));
  if(!allDone){
    addFloat('NOT READY!',840,430,P.bad);
    playErrorSound();
    return;
  }
  // score
  const pat=cust.patience/cust.patienceMax;
  const tip=pat>0.7?3:pat>0.4?1:0;
  const earned=d.price+tip;
  G.money+=earned;
  G.ordersComplete++;
  G.combo++;
  playServeSound(tip);
  const x=60+G.currentOrder*210+90;
  addFloat(`+$${earned}${tip>0?' TIP!':''}`,x,430,tip>0?P.tip:P.score);
  if(G.combo>1) addFloat(`COMBO x${G.combo}!`,450,400,P.caramel);
  spawnParticles(x,450,'#f5c842',12);
  cust.done=true;
  G.queue.splice(G.currentOrder,1);
  activeDrink=null;
  buildSteps=[];
  resetCup();
  G.currentOrder=G.queue.length>0?0:null;
  if(G.currentOrder!==null) activeDrink=G.queue[0].drink;
}

// ─────────────────────────────────────────────────────────────
// CUSTOMER SPAWNING
// Spawn rate accelerates each day: interval = max(180−day×15, 80)
// frames, so by day 7 the minimum 80-frame (~1.3 s) interval is
// reached and stays constant for all later days.
// ─────────────────────────────────────────────────────────────
let spawnTimer=0;
/**
 * Called once per game frame.  Increments spawnTimer and pushes a
 * new customer when the threshold is met and the queue isn't full.
 */
function maybeSpawnCustomer(){
  spawnTimer++;
  const rate=Math.max(180-G.day*15,80); // frames between spawns
  if(spawnTimer>rate&&G.queue.length<G.maxQueue){
    G.queue.push(makeCustomer());
    spawnTimer=0;
  }
}

// ─────────────────────────────────────────────────────────────
// TUTORIAL LOGIC
// The tutorial reuses the full game rendering pipeline but wraps
// all input in handleTutorialClick / tryPickUpIngredient guards
// so only the highlighted action can be performed at each step.
// Tutorial customers have patienceRate=0 so they never walk out.
// ─────────────────────────────────────────────────────────────
/** Reset all game state and enter the tutorial at step 0. */
function startTutorial(){
  G.state='tutorial';
  TUT.step=0;
  TUT.tutorialOrderPlaced=false;
  TUT.arrowBlink=0;
  G.queue=[];
  G.currentOrder=null;
  activeDrink=null;
  buildSteps=[];
  G.particles=[];
  G.floatTexts=[];
  G.station={};
  G.money=0;
  G.ordersComplete=0;
  G.combo=0;
}

/** Return the current tutorial step definition object, or undefined if complete. */
function getTutStep(){ return TUT.steps[TUT.step]; }

/**
 * Advance to the next tutorial step and set up the queue/order
 * state required by that step.  If the new step needs a drink,
 * inject a scripted tutorial customer with patienceRate=0.
 * If no drink is needed, clear the queue so the screen is clean.
 */
function advanceTutorial(){
  TUT.step++;
  TUT.tutorialOrderPlaced=false;
  // Inject a scripted customer if the next step involves a drink
  const s=TUT.steps[TUT.step];
  if(!s) return;
  if(s.drink&&(G.queue.length===0||(G.queue[0]&&G.queue[0].drink!==s.drink))){
    const tutCust={
      name:'TUTORIAL',
      drink:s.drink,
      drinkData:DRINKS[s.drink],
      patience:100, patienceMax:100,
      patienceRate:0,
      x:80, tx:80, y:255,
      skin:P.customer1, color:P.customer1,
      shirt:P.shirt2,
      pants:'#2a3a6a',
      hairColor:'#c87820',
      hairStyle:'bun',
      accessory:'none',
      done:false, expression:'meh',
    };
    G.queue=[tutCust];
    G.currentOrder=null;
    activeDrink=null;
    buildSteps=[];
  } else if(!s.drink){
    G.queue=[];
    G.currentOrder=null;
    activeDrink=null;
    buildSteps=[];
  }
}

/**
 * Handle clicks during tutorial mode.  Validates that the click
 * matches the expected action for the current step; if not,
 * shows a hint float-text instead of advancing.
 * @param {number} mx,my - Canvas-space coordinates.
 */
function handleTutorialClick(mx,my){
  const s=getTutStep();
  if(!s) return;

  if(s.action==='next'||s.action==='start_game'){
    if(s.action==='start_game'){ startGame(); return; }
    advanceTutorial(); return;
  }

  if(s.action==='select_order'){
    if(G.queue.length>0){
      const b=customerBubbleBounds(G.queue[0]);
      if(mx>=b.x1&&mx<=b.x2&&my>=b.y1&&my<=b.y2){
        G.currentOrder=0;
        activeDrink=G.queue[0].drink;
        buildSteps=[]; resetCup();
        spawnParticles(G.queue[0].x,G.queue[0].y-120,P.caramel);
        advanceTutorial(); return;
      }
    }
    addFloat('CLICK THE THOUGHT BUBBLE!',450,220,P.score); return;
  }

  if(s.action==='do_step'){
    const targetStation=STATIONS.find(st=>st.id===s.highlight);
    if(targetStation&&mx>=targetStation.x&&mx<=targetStation.x+targetStation.w&&
       my>=targetStation.y&&my<=targetStation.y+targetStation.h){
      addFloat('DRAG ME TO THE CUP!', targetStation.x+targetStation.w/2, targetStation.y-14, P.score);
    }
    return;
  }

  if(s.action==='serve'){
    const bx=CUP_CX-75,by=CUP_CY+56,bw=150,bh=36;
    if(mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh){
      serveDrink();
      G.queue=[]; G.currentOrder=null; activeDrink=null; buildSteps=[]; resetCup();
      advanceTutorial();
    } else {
      addFloat('CLICK THE SERVE BUTTON!',CUP_CX,CUP_CY+40,P.score);
    }
    return;
  }
}

/**
 * Draw the tutorial overlay: full game scene with non-highlighted
 * stations dimmed, step-specific spotlight effects, the MEL speech
 * box at the top, and progress dots at the bottom-right.
 */
function drawTutorial(){
  drawBG();
  const s=getTutStep();

  // Stations — dim non-highlighted ones
  STATIONS.forEach(st=>{
    const isHighlight=s&&s.highlight===st.id;
    const isDone=activeDrink&&buildSteps.includes(st.action)&&DRINKS[activeDrink]?.steps.includes(st.action);
    const hover=mouseX>=st.x&&mouseX<=st.x+st.w&&mouseY>=st.y&&mouseY<=st.y+st.h;
    drawStation(st, hover&&isHighlight, isHighlight&&!isDone, isDone);
    if(!isHighlight&&!isDone&&s&&s.highlight&&s.highlight!=='queue'&&s.highlight!=='serve_btn'){
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(st.x,st.y,st.w,st.h);
    }
  });

  // Highlight customer bubble
  if(s&&s.highlight==='queue'&&G.queue.length>0){
    const b=customerBubbleBounds(G.queue[0]);
    const pulse=0.5+0.5*Math.sin(Date.now()/200);
    ctx.strokeStyle=P.score; ctx.lineWidth=3; ctx.globalAlpha=0.5+pulse*0.5;
    ctx.strokeRect(b.x1,b.y1,b.x2-b.x1,b.y2-b.y1); ctx.globalAlpha=1;
    pixText('▼',G.queue[0].x,b.y1-10+Math.sin(Date.now()/300)*5,P.score,14,'center');
  }

  G.queue.forEach((cust,i)=>{ drawCustomer(cust,cust.x||80,i); });
  drawQueue();
  drawCenteredCup();

  // Serve button pulse highlight
  if(s&&s.highlight==='serve_btn'&&activeDrink){
    const d=DRINKS[activeDrink];
    if(buildSteps.filter(st=>d.steps.includes(st)).length===d.steps.length){
      const pulse=0.5+0.5*Math.sin(Date.now()/180);
      ctx.strokeStyle=`rgba(100,255,60,${pulse})`; ctx.lineWidth=3;
      ctx.strokeRect(CUP_CX-78,CUP_CY+53,156,42);
      pixText('▲ CLICK HERE!',CUP_CX,CUP_CY+52,`rgba(100,255,60,${pulse})`,8,'center');
    }
  }

  drawIngredientDrag();

  // Speech box — top strip just below HUD, clear of all game elements
  if(s){
    pixOutlineRect(0,28,900,78,'#140800','#7a4520',2);
    // Chef Mel avatar
    pixRect(6,32,52,70,'#3d1a00'); pixRect(10,34,44,66,P.shirt1);
    pixRect(14,34,36,20,P.customer2);
    pixRect(18,38,6,4,'#1a0a00'); pixRect(28,38,6,4,'#1a0a00');
    pixRect(16,46,14,2,'#1a0a00'); pixRect(18,32,20,4,'#1a0a00');
    pixText('MEL',36,32,'#999',5,'center');
    // Message lines
    s.msg.split('\n').forEach((line,i)=>{ pixText(line,68,46+i*16,P.cream,8); });
    // Blinking sub-message on right side
    if(Math.floor(Date.now()/500)%2===0)
      pixText(s.subMsg,870,92,P.score,7,'right');
    // Progress dots bottom-right
    const nd=TUT.steps.length;
    for(let i=0;i<nd;i++){
      const pulse=i===TUT.step?0.4+0.4*Math.sin(Date.now()/300):0;
      ctx.fillStyle=i===TUT.step?P.score:'#3a1800';
      ctx.beginPath(); ctx.arc(660+i*14, 96, i===TUT.step?5:3, 0, Math.PI*2); ctx.fill();
    }
  }

  // HUD
  pixRect(0,0,900,28,'#0d0600');
  pixText('TUTORIAL',10,20,P.caramel,9); pixText('$'+G.money,200,20,P.score,9);
  pixText('NO TIMER',450,20,P.tip,8,'center'); pixText('ORDERS: '+G.ordersComplete,680,20,P.cream,8);
  drawMuteBtn();

  G.particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);});
  ctx.globalAlpha=1;
  G.floatTexts.forEach(f=>{ctx.globalAlpha=f.life;pixText(f.txt,f.x,f.y,f.col,9,'center');});
  ctx.globalAlpha=1;
}

// ─────────────────────────────────────────────────────────────
// STATE TRANSITIONS
// ─────────────────────────────────────────────────────────────
/**
 * Begin Day 1 of actual gameplay (called at end of tutorial).
 * Resets all transient state; G.day and G.decorations are NOT
 * reset here so progression persists from the tutorial context.
 */
function startGame(){
  G.state='game';
  G.queue=[];
  G.currentOrder=null;
  G.money=0;
  G.ordersComplete=0;
  G.combo=0;
  G.timer=G.maxTimer;
  activeDrink=null;
  buildSteps=[];
  spawnTimer=0;
  G.particles=[];
  G.floatTexts=[];
  G.station={};
}

/**
 * Advance to the next day.  maxTimer grows by 5 s per day so
 * later days give the player more time to handle the faster
 * customer spawn rate.  G.money is NOT reset — earnings carry
 * over so the player can save for expensive shop items.
 */
function nextDay(){
  G.day++;
  G.state='game';
  G.queue=[];
  G.currentOrder=null;
  G.ordersComplete=0;
  G.combo=0;
  G.timer=G.maxTimer+G.day*5;
  G.maxTimer=G.timer;
  activeDrink=null;
  buildSteps=[];
  spawnTimer=0;
  G.particles=[];
  G.floatTexts=[];
  G.station={};
}

// ─────────────────────────────────────────────────────────────
// MOUSE / TOUCH INPUT
// getCanvasPos normalises both mouse and touch events to the
// 900×600 logical canvas space, accounting for CSS scaling.
// mouseX/mouseY are updated on every move event so hover
// states in draw functions read current pointer position.
// ─────────────────────────────────────────────────────────────
let mouseX=0, mouseY=0;

/**
 * Convert a mouse or touch event to canvas-space coordinates.
 * Divides by the CSS-rendered size ratio so the game works
 * correctly at any display scale (responsive canvas).
 * @returns {{x: number, y: number}}
 */
function getCanvasPos(e){
  const r=c.getBoundingClientRect();
  const touch=e.touches?e.touches[0]:e;
  return {
    x:Math.round((touch.clientX-r.left)*(900/r.width)),
    y:Math.round((touch.clientY-r.top)*(600/r.height))
  };
}

c.addEventListener('mousemove',e=>{
  const p=getCanvasPos(e);
  mouseX=p.x; mouseY=p.y;
  if(drag.active){
    drag.x=p.x+drag.offsetX;
    drag.y=p.y+drag.offsetY;
    c.style.cursor='grabbing';
  } else {
    c.style.cursor='default';
  }
});

c.addEventListener('mousedown',e=>{
  const p=getCanvasPos(e);
  startMusic();
  if(G.state==='game'||G.state==='tutorial') tryPickUpIngredient(p.x, p.y);
});

c.addEventListener('mouseup',e=>{
  if((G.state==='game'||G.state==='tutorial') && drag.active){
    drag.active=false;
    tryDropIngredient(drag.x, drag.y);
  }
});

c.addEventListener('touchstart',e=>{
  e.preventDefault();
  const p=getCanvasPos(e);
  startMusic();
  if(G.state==='game'||G.state==='tutorial') tryPickUpIngredient(p.x, p.y);
  else handleClick(p.x, p.y);
},{passive:false});

c.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!drag.active) return;
  const p=getCanvasPos(e);
  mouseX=p.x; mouseY=p.y;
  drag.x=p.x+drag.offsetX;
  drag.y=p.y+drag.offsetY;
},{passive:false});

c.addEventListener('touchend',e=>{
  e.preventDefault();
  if((G.state==='game'||G.state==='tutorial') && drag.active){
    drag.active=false;
    tryDropIngredient(drag.x, drag.y);
  }
},{passive:false});

c.addEventListener('click',e=>{
  const p=getCanvasPos(e);
  handleClick(p.x, p.y);
});

/**
 * Test whether a pointer-down hit a station and begin dragging.
 * In tutorial mode, only the currently highlighted station is
 * allowed; attempting any other station shows a redirecting hint.
 * Stations already completed for the current drink are rejected
 * immediately so duplicates can't be accidentally applied.
 * @param {number} mx,my - Canvas-space pointer coordinates.
 */
function tryPickUpIngredient(mx, my){
  if(!activeDrink || drag.flying) return; // ignore if no order or mid-flight
  for(const s of STATIONS){
    if(mx>=s.x && mx<=s.x+s.w && my>=s.y && my<=s.y+s.h){
      // In tutorial, only allow the highlighted station
      if(G.state==='tutorial'){
        const ts=getTutStep();
        if(!ts||ts.action!=='do_step'||ts.highlight!==s.id){
          const expected=STATIONS.find(st=>st.id===ts?.highlight);
          if(expected) addFloat('GRAB THE '+expected.label+'!', expected.x+expected.w/2, expected.y-14, P.score);
          return;
        }
      }
      if(buildSteps.includes(s.action)){
        addFloat('ALREADY DONE!', s.x+s.w/2, s.y-10, '#999');
        playErrorSound();
        return;
      }
      drag.active=true;
      drag.station=s;
      drag.x=mx; drag.y=my;
      drag.offsetX=0; drag.offsetY=0;
      c.style.cursor='grabbing';
      return;
    }
  }
}

/**
 * Handle pointer-up: validate the drop target and start the fly
 * animation if correct, or show error feedback if wrong.
 *
 * Cup hit area is slightly larger than the visual cup (+20/+40 px)
 * for a forgiving drop zone.  If dropped outside the cup the
 * ingredient silently disappears — the player just tries again.
 *
 * Error cases shown here (before flying starts):
 *   - Station has a `needs` prerequisite not yet in buildSteps
 *   - Step already added (duplicate)
 *   - Out-of-order step (nextNeeded !== s.action)
 *
 * @param {number} mx,my - Canvas-space pointer coordinates.
 */
function tryDropIngredient(mx, my){
  c.style.cursor='default';
  if(!drag.station || !activeDrink) return;
  const s=drag.station;
  drag.station=null;

  const d=DRINKS[activeDrink];
  const nextNeeded=d.steps.find(step=>!buildSteps.includes(step));

  // Generous hit box: cup width + 20 px sides, +20 px above, +20 px below
  const onCup = mx>=CUP_CX-CUP_W/2-20 && mx<=CUP_CX+CUP_W/2+40
             && my>=CUP_CY-CUP_H-20   && my<=CUP_CY+20;

  if(onCup){
    if(s.needs && !buildSteps.includes(s.needs)){
      addFloat('GRIND FIRST!', CUP_CX, CUP_CY-CUP_H-40, P.bad);
      playErrorSound();
      return;
    }
    if(nextNeeded===s.action){
      // Launch flying arc animation
      drag.flying=true;
      drag.flyTimer=0;
      drag.flyFromX=mx;
      drag.flyFromY=my;
      drag.station=s; // keep for applyIngredient
    } else if(buildSteps.includes(s.action)){
      addFloat('ALREADY ADDED!', CUP_CX, CUP_CY-CUP_H-40, '#999');
      playErrorSound();
    } else {
      addFloat('NOT YET!', CUP_CX, CUP_CY-CUP_H-40, P.bad);
      playErrorSound();
    }
  }
  // Off-cup drop: ingredient vanishes — no penalty, player reattempts
}

// ─────────────────────────────────────────────────────────────
// MAIN LOOP
// Uses requestAnimationFrame for smooth 60 fps rendering.
// dt (delta-time in seconds) is used only for G.timer so the
// countdown is frame-rate independent.  All animation (particles,
// fly arc, fill levels) is frame-count based for simplicity.
//
// Update order each game frame:
//   1. Decrement timer → end day if expired
//   2. Maybe spawn a new customer
//   3. Decay customer patience → handle walkouts & combo reset
//   4. Tick station flash timers
//   5. Advance flying ingredient animation
//   6. Tick particles and float texts
//   7. Draw everything (BG → stations → customers → cup → HUD → FX)
// ─────────────────────────────────────────────────────────────
let last=0;
/**
 * Core game loop — called every animation frame by the browser.
 * @param {DOMHighResTimeStamp} ts - Current timestamp in milliseconds.
 */
function loop(ts){
  const dt=(ts-last)/1000; // seconds since last frame
  last=ts;

  ctx.clearRect(0,0,900,600);

  if(G.state==='title'){ drawTitle(); requestAnimationFrame(loop); return; }
  if(G.state==='score'){ drawScoreScreen(); requestAnimationFrame(loop); return; }
  if(G.state==='shop'){ drawShop(); requestAnimationFrame(loop); return; }

  // TUTORIAL STATE
  if(G.state==='tutorial'){
    G.particles.forEach(p=>{p.x+=p.dx;p.y+=p.dy;p.dy+=0.1;p.life-=0.03;});
    G.particles=G.particles.filter(p=>p.life>0);
    G.floatTexts.forEach(f=>{f.y+=f.vy;f.life-=0.025;});
    G.floatTexts=G.floatTexts.filter(f=>f.life>0);
    Object.keys(G.station).forEach(k=>{ if(!k.startsWith('fill_')&&G.station[k]>0) G.station[k]--; });
    // Process flying animation in tutorial too
    if(drag.flying){
      drag.flyTimer++;
      if(drag.flyTimer>=drag.flyMax){
        drag.flying=false;
        const s=drag.station; drag.station=null;
        if(s) applyIngredient(s);
      }
    }
    drawTutorial();
    requestAnimationFrame(loop);
    return;
  }

  // UPDATE
  G.timer-=dt;
  if(G.timer<=0){ G.state='score'; requestAnimationFrame(loop); return; }

  maybeSpawnCustomer();

  // Update customer patience
  G.queue.forEach((cust,i)=>{
    cust.patience-=cust.patienceRate;
    // slide in
    const tx=100+i*210;
    if(cust.x>tx) cust.x=Math.max(cust.x-8,tx);
    if(cust.patience<=0){
      // Customer walked out — break combo streak as punishment
      G.combo=0;
      addFloat('WALKED OUT!',(cust.x||tx),cust.y-20,P.bad);
      G.queue.splice(i,1);
      if(G.currentOrder!==null){
        if(G.currentOrder>=G.queue.length) G.currentOrder=G.queue.length>0?0:null;
        if(G.currentOrder!==null) activeDrink=G.queue[G.currentOrder].drink;
        else { activeDrink=null; buildSteps=[]; }
      }
    }
  });

  // Update station timers
  Object.keys(G.station).forEach(k=>{ if(!k.startsWith('fill_')&&G.station[k]>0) G.station[k]--; });

  // Update flying ingredient animation
  if(drag.flying){
    drag.flyTimer++;
    if(drag.flyTimer>=drag.flyMax){
      drag.flying=false;
      const s=drag.station; drag.station=null;
      if(s) applyIngredient(s);
    }
  }

  // Update particles
  G.particles.forEach(p=>{p.x+=p.dx;p.y+=p.dy;p.dy+=0.1;p.life-=0.03;});
  G.particles=G.particles.filter(p=>p.life>0);

  // Update float texts
  G.floatTexts.forEach(f=>{f.y+=f.vy;f.life-=0.025;});
  G.floatTexts=G.floatTexts.filter(f=>f.life>0);

  // DRAW
  drawBG();

  // Pre-compute next required step so drawStation can highlight it without re-scanning
  const nextAction = activeDrink ? DRINKS[activeDrink].steps.find(s=>!buildSteps.includes(s)) : null;

  // Stations on left and right sides
  STATIONS.forEach(s=>{
    const hover = !drag.active && mouseX>=s.x && mouseX<=s.x+s.w && mouseY>=s.y && mouseY<=s.y+s.h;
    const isDone = activeDrink && buildSteps.includes(s.action) && DRINKS[activeDrink].steps.includes(s.action);
    const isNext = s.action===nextAction && activeDrink;
    drawStation(s, hover, isNext, isDone);
    if(hover && !drag.active) c.style.cursor='grab';
  });

  // Customers
  G.queue.forEach((cust,i)=>{ drawCustomer(cust,cust.x,i); });

  drawQueue();
  drawCenteredCup();
  drawIngredientDrag();
  drawHUD();

  // Particles (drawn on top)
  G.particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });
  ctx.globalAlpha=1;

  // Float texts
  G.floatTexts.forEach(f=>{
    ctx.globalAlpha=f.life;
    pixText(f.txt,f.x,f.y,f.col,9,'center');
  });
  ctx.globalAlpha=1;

  // Instructions
  if(G.currentOrder===null && G.queue.length>0){
    if(Math.floor(Date.now()/800)%2===0)
      pixText('▲ CLICK A CUSTOMER TO TAKE THEIR ORDER ▲',450,420,P.score,8,'center');
  }
  if(G.currentOrder!==null && activeDrink && !drag.flying){
    const d=DRINKS[activeDrink];
    const next=d.steps.find(s=>!buildSteps.includes(s));
    const stationForNext = next ? STATIONS.find(s=>s.action===next) : null;
    if(stationForNext){
      const side = stationForNext.x < 400 ? '◀ LEFT' : 'RIGHT ▶';
      pixText(`DRAG ${stationForNext.icon} ${stationForNext.label} TO CUP`, 450, 290, P.caramel, 8, 'center');
    } else if(!next){
      pixText('▼ CLICK SERVE! ▼', 450, 290, P.tip, 9, 'center');
    }
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
